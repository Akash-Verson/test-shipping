<div id="action-description">
    <p>The sample showcases the PDF viewer operating in a read-only mode, which restricts the ability to make changes to annotations and form fields.</p>
</div>
<div class="control-section">
    <div class="content-wrapper">
        <ejs-pdfviewer #pdfviewer id="pdfViewer" [documentPath]='document' [resourceUrl]='resource' (created)='Created($event)'  [toolbarSettings]="toolbarSettings" style="height:640px;display:block" 
        [enableStickyNotesAnnotation]="false" [enableAnnotationToolbar]="false" [enableDownload]="false" [annotationSettings]="annotation" [enablePageOrganizer]="false">
    </ejs-pdfviewer>
    </div>
</div>

<div id="description">
    <p>
        More information on the PDF Viewer instantiation can be found in this
        <a target="_blank" href="https://help.syncfusion.com/document-processing/pdf/pdf-viewer/angular/getting-started">
        documentation section</a>.
    </p>
</div>
